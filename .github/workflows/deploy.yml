name: PartyKit Deploy Retry

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - name: Retry deploy with random intervals
        timeout-minutes: 120
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
        run: |
          set -eo pipefail
          for cycle in $(seq 1 20); do
            wait_time=$((300 + RANDOM % 60))
            echo "=== Cycle $cycle/20: Next attempt in ${wait_time}s ==="
            sleep $wait_time
            echo "Attempting deploy..."
            if npx partykit deploy 2>&1 | tee deploy.log; then
              echo "SUCCESS on cycle $cycle!"
              exit 0
            fi
            echo "Cycle $cycle failed. Will retry in ~5min..."
          done
          echo "All cycles failed."
          exit 1
